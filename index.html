<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>투자 캘린더</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;background:#0a0a1a;color:#e5e7eb;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
button,input,select,textarea{font-family:inherit}

.wrap{display:flex;flex-direction:column;height:100%}

/* Header */
.hd{padding:12px 16px;background:#0f0f23;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.hd-title{font-size:16px;font-weight:800;color:#fff;margin-right:auto}
.hd-btn{padding:5px 12px;border-radius:6px;border:none;font-size:10px;font-weight:700;color:#9ca3af;background:rgba(255,255,255,.04);cursor:pointer;-webkit-tap-highlight-color:transparent}
.hd-btn.on{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}

/* Filter Bar */
.fbar{padding:8px 16px;background:#0f0f23;border-bottom:1px solid rgba(255,255,255,.04);display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.fchip{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#9ca3af;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.fchip.on{background:rgba(102,126,234,.2);border-color:rgba(102,126,234,.4);color:#a5b4fc}
.fdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:3px}

/* Nav */
.nav{padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-btn{background:rgba(255,255,255,.06);border:none;color:#fff;font-size:16px;border-radius:6px;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.nav-label{font-size:16px;font-weight:800;color:#fff;min-width:130px;text-align:center}
.nav-today{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;background:rgba(102,126,234,.15);border:1px solid rgba(102,126,234,.3);color:#818cf8;cursor:pointer}

/* Content */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 12px 80px 12px}

/* Calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dh{text-align:center;padding:6px 0;font-size:10px;font-weight:700;color:#6b7280}
.cal-dh.sun{color:#f87171}.cal-dh.sat{color:#60a5fa}
.cell{min-height:60px;background:rgba(255,255,255,.015);border-radius:5px;padding:2px 3px;border:1px solid rgba(255,255,255,.03)}
.cell.today{border:2px solid #667eea;background:rgba(102,126,234,.05)}
.cell.empty{opacity:.15}
.cell-num{font-size:10px;font-weight:600;color:#9ca3af;margin-bottom:1px;display:flex;align-items:center;gap:2px}
.cell-num.sun{color:#f87171}.cell-num.sat{color:#60a5fa}
.cell-num .tbd{font-size:6px;background:#667eea;color:#fff;padding:0 3px;border-radius:3px;font-weight:800}
.cell-ev{font-size:7.5px;padding:1px 3px;border-radius:2px;margin-bottom:1px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-left:2px solid transparent;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cell-more{font-size:7px;color:#6b7280;text-align:center}

/* Cards (timeline/upcoming) */
.ecard{border-radius:8px;padding:10px 12px;margin-bottom:5px;cursor:pointer;border-left:3px solid transparent;-webkit-tap-highlight-color:transparent}
.ecard-top{display:flex;align-items:center;gap:5px}
.ecard-ic{font-size:13px}
.ecard-ti{font-size:12px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ecard-imp{font-size:8px;background:#fecaca;color:#dc2626;padding:1px 5px;border-radius:5px;font-weight:700}
.ecard-meta{display:flex;gap:6px;margin-top:3px;font-size:10px;color:#9ca3af;flex-wrap:wrap}
.ecard-dd{margin-left:auto;font-weight:700}

/* Timeline */
.tl-mo{font-size:13px;font-weight:800;color:#818cf8;margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.06)}
.tl-row{display:flex;gap:8px;margin-bottom:2px}
.tl-dt{min-width:36px;text-align:right;font-size:10px;color:#6b7280;font-weight:600;padding-top:10px}
.tl-dotw{display:flex;flex-direction:column;align-items:center;padding-top:12px}
.tl-d{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tl-l{width:1px;flex:1;background:rgba(255,255,255,.06);min-height:12px}

/* Upcoming */
.up-row{display:flex;gap:8px;margin-bottom:5px}
.up-dd{min-width:50px;background:rgba(255,255,255,.03);border-radius:7px;padding:6px;text-align:center;display:flex;flex-direction:column;justify-content:center}
.up-num{font-size:13px;font-weight:900}
.up-sub{font-size:8px;color:#6b7280}

/* Overlay */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.ov-hide{display:none}

/* Modal */
.mdl{background:#1a1a2e;border-radius:16px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mdl-top{padding:18px 20px 10px;position:relative}
.mdl-x{position:absolute;top:8px;right:12px;background:none;border:none;font-size:18px;color:#6b7280;padding:6px;cursor:pointer}
.mdl-ic{font-size:26px;margin-bottom:4px}
.mdl-ti{font-size:17px;font-weight:900;color:#fff}
.mdl-co{font-size:11px;color:#9ca3af;margin-top:2px}
.mdl-tags{display:flex;gap:4px;flex-wrap:wrap;padding:0 20px 10px}
.mdl-tag{padding:2px 9px;border-radius:8px;font-size:10px;font-weight:700}
.mdl-memo{margin:0 20px 16px;background:rgba(255,255,255,.04);border-radius:8px;padding:12px;font-size:12px;line-height:1.7;color:#d1d5db}
.mdl-memo b{color:#fff}
.mdl-acts{padding:8px 20px 16px;display:flex;gap:6px}
.mdl-ab{padding:6px 14px;border-radius:7px;font-size:11px;font-weight:700;border:none;cursor:pointer}
.mdl-ab.edt{background:rgba(102,126,234,.2);color:#818cf8}
.mdl-ab.del{background:rgba(239,68,68,.15);color:#f87171}

/* Form */
.frm{background:#1a1a2e;border-radius:16px;padding:18px 20px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.frm h3{font-size:15px;font-weight:800;color:#fff;margin-bottom:12px}
.frow{margin-bottom:10px}
.frow label{display:block;font-size:10px;color:#9ca3af;font-weight:700;margin-bottom:3px;letter-spacing:.5px}
.frow input,.frow select,.frow textarea{width:100%;padding:8px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;font-size:13px;font-family:inherit;outline:none;-webkit-appearance:none}
.frow input:focus,.frow select:focus,.frow textarea:focus{border-color:rgba(102,126,234,.5)}
.frow textarea{resize:vertical;min-height:50px}
.frow select option{background:#1a1a2e}
.fchk{display:flex;align-items:center;gap:6px;font-size:12px;color:#e5e7eb;cursor:pointer}
.fchk input{width:16px;height:16px;accent-color:#667eea}
.icpick{display:flex;gap:4px;flex-wrap:wrap}
.icopt{font-size:17px;padding:3px 5px;border-radius:5px;border:1px solid transparent;cursor:pointer;-webkit-tap-highlight-color:transparent}
.icopt.on{background:rgba(102,126,234,.3);border-color:#667eea}
.fbtns{display:flex;gap:6px;margin-top:12px;justify-content:flex-end}
.fb{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer}
.fb.fc{background:rgba(255,255,255,.06);color:#9ca3af}
.fb.fs{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}

/* FAB */
.fab{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));right:16px;width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:#fff;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(102,126,234,.4);display:flex;align-items:center;justify-content:center;z-index:100;-webkit-tap-highlight-color:transparent}

/* Landscape iPad */
@media(min-width:768px){
  .cell{min-height:90px}
  .cell-ev{font-size:9px;padding:2px 4px}
  .body{padding:12px 20px 80px}
}
</style>
</head>

</div>

// State
var events,companies,yr=2026,mo=2,selCo="전체",selCat="전체",view="calendar",nid=300;

function load(){
  try{var e=localStorage.getItem("ivcal2_e");if(e)events=JSON.parse(e)}catch(x){}
  try{var c=localStorage.getItem("ivcal2_c");if(c)companies=JSON.parse(c)}catch(x){}
  if(!events)events=DEF.slice();
  if(!companies){var s={};for(var i=0;i<events.length;i++)s[events[i].company]=1;companies=Object.keys(s)}
}
function save(){
  try{localStorage.setItem("ivcal2_e",JSON.stringify(events));localStorage.setItem("ivcal2_c",JSON.stringify(companies))}catch(x){}
}
function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function fmtD(d){var x=new Date(d+"T00:00:00");return(x.getMonth()+1)+"/"+x.getDate()+" ("+DK[x.getDay()]+")"}
function dUntil(d){var t=new Date();t.setHours(0,0,0,0);var diff=Math.ceil((new Date(d+"T00:00:00")-t)/864e5);if(diff===0)return"오늘";if(diff===1)return"내일";if(diff<0)return Math.abs(diff)+"일 전";return"D-"+diff}
function todayS(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function cc(c){return CATS[c]||CATS["\uAE30\uD0C0"]}
function dim(y,m){return new Date(y,m+1,0).getDate()}
function fdow(y,m){return new Date(y,m,1).getDay()}

function filt(){
  var r=[];
  for(var i=0;i<events.length;i++){
    var e=events[i];
    if(selCo!=="전체"&&e.company!==selCo)continue;
    if(selCat!=="전체"&&e.category!==selCat)continue;
    r.push(e);
  }
  return r;
}

// ── Render ──
function render(){
  renderFilters();
  renderNav();
  renderBody();
}

function renderFilters(){
  var h="";
  var allCo=["전체"].concat(companies);
  for(var i=0;i<allCo.length;i++){
    h+='<span class="fchip'+(selCo===allCo[i]?" on":"")+'" data-co="'+esc(allCo[i])+'">'+esc(allCo[i])+'</span>';
  }
  h+='<span style="width:8px"></span>';
  for(var i=0;i<CAT_LIST.length;i++){
    var cl=CATS[CAT_LIST[i]];
    h+='<span class="fchip'+(selCat===CAT_LIST[i]?" on":"")+'" data-cat="'+CAT_LIST[i]+'"><span class="fdot" style="background:'+cl.dt+'"></span>'+CAT_LIST[i]+'</span>';
  }
  document.getElementById("filterBar").innerHTML=h;
}

function renderNav(){
  var h="";
  if(view==="calendar"){
    h='<button class="nav-btn" id="prevM">‹</button>';
    h+='<span class="nav-label">'+yr+'년 '+MK[mo]+'</span>';
    h+='<button class="nav-btn" id="nextM">›</button>';
    h+='<button class="nav-today" id="goToday">오늘</button>';
  }else{
    h='<span class="nav-label">'+(view==="timeline"?"📋 전체 타임라인":"⏰ 다가오는 이벤트")+'</span>';
  }
  document.getElementById("navBar").innerHTML=h;
}

function renderBody(){
  var f=filt();
  var h="";

  if(view==="calendar"){
    var mp=yr+"-"+String(mo+1).padStart(2,"0");
    var mEvs=[];for(var i=0;i<f.length;i++)if(f[i].date.indexOf(mp)===0)mEvs.push(f[i]);
    var byDay={};for(var i=0;i<mEvs.length;i++){var d=parseInt(mEvs[i].date.split("-")[2]);if(!byDay[d])byDay[d]=[];byDay[d].push(mEvs[i])}
    var dm=dim(yr,mo),fd=fdow(yr,mo),td=todayS();

    h='<div class="cal">';
    for(var i=0;i<7;i++)h+='<div class="cal-dh'+(i===0?" sun":"")+(i===6?" sat":"")+'">'+DK[i]+'</div>';
    for(var i=0;i<fd;i++)h+='<div class="cell empty"></div>';
    for(var d=1;d<=dm;d++){
      var evs=byDay[d]||[];
      var ds=yr+"-"+String(mo+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
      var isT=ds===td;var dow=(fd+d-1)%7;
      h+='<div class="cell'+(isT?" today":"")+'">';
      h+='<div class="cell-num'+(dow===0?" sun":"")+(dow===6?" sat":"")+'">'+d+(isT?'<span class="tbd">TODAY</span>':"")+'</div>';
      for(var j=0;j<Math.min(evs.length,3);j++){
        var e=evs[j],c=cc(e.category);
        h+='<div class="cell-ev" data-eid="'+e.id+'" style="background:'+c.bg+';color:'+c.tx+';border-left-color:'+c.bd+'">'+(e.important?"⚡":"")+e.icon+" "+(e.title.length>10?esc(e.title.slice(0,10))+"…":esc(e.title))+'</div>';
      }
      if(evs.length>3)h+='<div class="cell-more">+'+(evs.length-3)+'개</div>';
      h+='</div>';
    }
    h+='</div>';
  }

  if(view==="timeline"){
    var sorted=f.slice().sort(function(a,b){return a.date<b.date?-1:1});
    var pm="";
    for(var i=0;i<sorted.length;i++){
      var e=sorted[i],m=e.date.slice(0,7);
      if(m!==pm){var mi=parseInt(e.date.split("-")[1])-1;h+='<div class="tl-mo">'+e.date.split("-")[0]+'년 '+MK[mi]+'</div>';pm=m}
      var c=cc(e.category);
      h+='<div class="tl-row"><div class="tl-dt">'+parseInt(e.date.split("-")[2])+'일</div><div class="tl-dotw"><div class="tl-d" style="background:'+c.dt+'"></div><div class="tl-l"></div></div><div style="flex:1">'+cardHTML(e)+'</div></div>';
    }
  }

  if(view==="upcoming"){
    var up=f.filter(function(e){return e.date>=todayS()}).sort(function(a,b){return a.date<b.date?-1:1}).slice(0,30);
    for(var i=0;i<up.length;i++){
      var e=up[i],dd=dUntil(e.date);
      var urg=dd.indexOf("D-")===0&&parseInt(dd.replace("D-",""))<=7;
      h+='<div class="up-row"><div class="up-dd"><div class="up-num" style="color:'+(urg?"#f87171":"#818cf8")+'">'+dd+'</div><div class="up-sub">'+fmtD(e.date).split(" ")[0]+'</div></div><div style="flex:1">'+cardHTML(e)+'</div></div>';
    }
  }

  document.getElementById("mainBody").innerHTML=h;
}

function cardHTML(e){
  var c=cc(e.category);
  return'<div class="ecard" data-eid="'+e.id+'" style="background:'+c.bg+';border-left-color:'+c.bd+'"><div class="ecard-top"><span class="ecard-ic">'+e.icon+'</span><span class="ecard-ti" style="color:'+c.tx+'">'+esc(e.title)+'</span>'+(e.important?'<span class="ecard-imp">중요</span>':"")+'</div><div class="ecard-meta"><span>'+esc(e.company)+'</span><span>·</span><span>'+fmtD(e.date)+'</span><span class="ecard-dd" style="color:'+c.tx+'">'+dUntil(e.date)+'</span></div></div>';
}

// ── Modal ──

  var e=null;for(var i=0;i<events.length;i++)if(events[i].id===id){e=events[i];break}

  var c=cc(e.category),dd=dUntil(e.date),fut=e.date>=todayS();

  h+='<div class="mdl-co">'+esc(e.company)+'</div></div>';
  h+='<div class="mdl-tags">';
  h+='<span class="mdl-tag" style="background:'+c.bg+';color:'+c.tx+'">'+e.category+'</span>';
  h+='<span class="mdl-tag" style="background:rgba(255,255,255,.06);color:#d1d5db">'+fmtD(e.date)+'</span>';
  h+='<span class="mdl-tag" style="background:'+(fut?"rgba(16,185,129,.15)":"rgba(239,68,68,.15)")+';color:'+(fut?"#6ee7b7":"#fca5a5")+'">'+dd+'</span>';
  if(e.important)h+='<span class="mdl-tag" style="background:rgba(239,68,68,.15);color:#fca5a5">⚡ 중요</span>';
  h+='</div>';
  if(e.memo)h+='<div class="mdl-memo"><b>투자 포인트</b><br>'+esc(e.memo)+'</div>';
  h+='<div class="mdl-acts"><button class="mdl-ab edt" data-edit="'+e.id+'">✏️ 수정</button><button class="mdl-ab del" data-del="'+e.id+'">🗑️ 삭제</button></div>';
  document.getElementById("modalContent").innerHTML=h;
  document.getElementById("overlay").classList.remove("ov-hide");
}

  h+='<div class="frow"><label>카테고리</label><select id="fCa">';
  for(var i=0;i<CAT_LIST.length;i++)h+='<option'+(CAT_LIST[i]===d.category?" selected":"")+'>'+CAT_LIST[i]+'</option>';
  h+='</select></div>';
  h+='<div class="frow"><label>아이콘</label><div class="icpick" id="icPick">';
  for(var i=0;i<ICONS.length;i++)h+='<span class="icopt'+(ICONS[i]===d.icon?" on":"")+'" data-ic="'+ICONS[i]+'">'+ICONS[i]+'</span>';
  h+='</div><input type="hidden" id="fIc" value="'+d.icon+'"></div>';
  h+='<div class="frow"><label>메모</label><textarea id="fMe" placeholder="투자 포인트">'+esc(d.memo)+'</textarea></div>';
  h+='<div class="frow"><label class="fchk"><input type="checkbox" id="fIm"'+(d.important?" checked":"")+'>⚡ 중요 이벤트</label></div>';

function closeOv(){document.getElementById("overlay").classList.add("ov-hide")}

// ── Event Delegation ──
document.addEventListener("click",function(e){
  var t=e.target;

  // View tabs
  if(t.id==="vCal"){view="calendar";updateTabs();render()}
  if(t.id==="vTl"){view="timeline";updateTabs();render()}
  if(t.id==="vUp"){view="upcoming";updateTabs();render()}

  // Filter chips
  if(t.dataset.co!==undefined){selCo=t.dataset.co;render()}
  if(t.dataset.cat!==undefined){selCat=t.dataset.cat;render()}

  // Nav
  if(t.id==="prevM"||t.parentElement&&t.parentElement.id==="prevM"){mo--;if(mo<0){mo=11;yr--}render()}
  if(t.id==="nextM"||t.parentElement&&t.parentElement.id==="nextM"){mo++;if(mo>11){mo=0;yr++}render()}
  if(t.id==="goToday"){var td=new Date();yr=td.getFullYear();mo=td.getMonth();render()}

  // Event cards/cells
  var eid=t.dataset.eid||t.closest&&t.closest("[data-eid]")&&t.closest("[data-eid]").dataset.eid;
  if(eid)showDetail(parseInt(eid));

  // Modal actions
  if(t.id==="mClose"||t.classList.contains("ov")&&!t.closest(".mdl,.frm"))closeOv();
  var editId=t.dataset.edit||t.closest&&t.closest("[data-edit]")&&t.closest("[data-edit]").dataset.edit;
  if(editId){closeOv();var ev=null;for(var i=0;i<events.length;i++)if(events[i].id===parseInt(editId)){ev=events[i];break}if(ev)setTimeout(function(){showForm(ev)},100)}
  var delId=t.dataset.del||t.closest&&t.closest("[data-del]")&&t.closest("[data-del]").dataset.del;
  if(delId){if(confirm("삭제할까요?")){events=events.filter(function(x){return x.id!==parseInt(delId)});save();closeOv();render()}}

  // FAB
  if(t.id==="addBtn"||t.closest&&t.closest("#addBtn"))showForm(null);

  // Form cancel
  if(t.id==="fCancel")closeOv();

  // Form save
  if(t.id==="fSave"){
    var newCo=document.getElementById("fNc").value.trim();
    var co=newCo||document.getElementById("fCo").value;
    var obj={
      date:document.getElementById("fD").value,
      title:document.getElementById("fT").value,
      company:co,
      category:document.getElementById("fCa").value,
      icon:document.getElementById("fIc").value,
      memo:document.getElementById("fMe").value,
      important:document.getElementById("fIm").checked
    };
    if(!obj.title||!obj.date){alert("제목과 날짜를 입력하세요");return}
    var eid2=t.dataset.eid;
    if(eid2){obj.id=parseInt(eid2);events=events.map(function(x){return x.id===obj.id?obj:x})}
    else{obj.id=nid++;events.push(obj)}
    if(companies.indexOf(obj.company)<0)companies.push(obj.company);
    save();closeOv();render();
  }

  // Icon picker
  if(t.dataset.ic){
    var picks=document.querySelectorAll(".icopt");
    for(var i=0;i<picks.length;i++)picks[i].classList.remove("on");
    t.classList.add("on");
    document.getElementById("fIc").value=t.dataset.ic;
  }
});

function updateTabs(){
  document.getElementById("vCal").className="hd-btn"+(view==="calendar"?" on":"");
  document.getElementById("vTl").className="hd-btn"+(view==="timeline"?" on":"");
  document.getElementById("vUp").className="hd-btn"+(view==="upcoming"?" on":"");
}

// Init
load();render();

})();
</script>
</body>
</html>

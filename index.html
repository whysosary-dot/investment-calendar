*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','Pretendard',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh;overflow-x:hidden;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
button,input,select,textarea{font-family:inherit;-webkit-tap-highlight-color:transparent}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:300px;background:#fff;border-right:1px solid #e5e5ea;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .25s ease,max-height .25s ease}
.sidebar.collapsed{width:48px}
.sidebar.collapsed .sb-body,.sidebar.collapsed .sb-header,.sidebar.collapsed .ev-list{display:none}
.sidebar.collapsed .sb-toggle{display:none}
.sidebar.collapsed .collapse-tab{display:flex}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f5f5f7}
.header{padding:14px 20px;border-bottom:1px solid #e5e5ea;display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#fff}
.content{flex:1;overflow-y:auto;padding:14px 20px}

/* Tablet (portrait iPad etc) */
@media(max-width:1024px){
  .app{flex-direction:column}
  .sidebar{width:100%!important;height:auto;max-height:40vh;border-right:none;border-bottom:1px solid #e5e5ea;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .sidebar.collapsed{max-height:none;overflow:hidden;height:auto}
  .content{padding:10px 12px}
  .header{padding:10px 12px}
  .fab{bottom:max(16px,env(safe-area-inset-bottom));right:16px;width:46px;height:46px;font-size:20px}
}

/* Phone portrait */
@media(max-width:600px){
  .cal-grid .day-cell{min-height:58px;padding:2px}
  .dn{font-size:10px}
  .de{font-size:7.5px!important;padding:1px 2px!important}
  .vtabs{gap:2px}
  .vtab{padding:3px 8px;font-size:9px}
  .cal-nav .ml{font-size:14px;min-width:110px}
  .chip{padding:2px 7px;font-size:9px}
  .evc{padding:7px 10px}
  .evc .evc-ti{font-size:11px}
  .evc .evc-meta{font-size:9px}
  .header{gap:6px}
}

/* Sidebar */
.sb-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:#fafafa;flex-shrink:0;-webkit-tap-highlight-color:transparent;border-bottom:1px solid #e5e5ea}
.sb-toggle span{font-size:13px;font-weight:700;color:#1d1d1f}
.sb-toggle .arrow{font-size:12px;color:#8e8e93;transition:transform .2s}
.sb-header{padding:14px 14px 10px;border-bottom:1px solid #e5e5ea}
.sb-header h2{font-size:15px;font-weight:800;color:#1d1d1f}
.sb-body{}
.filter-grp{padding:10px 14px;border-bottom:1px solid #f2f2f7}
.filter-label{font-size:9px;color:#8e8e93;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{padding:3px 9px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid #e5e5ea;background:#fff;color:#636366;transition:all .15s;-webkit-tap-highlight-color:transparent}
.chip:hover,.chip:active{background:#f2f2f7}
.chip.on{background:#e8eaf6;border-color:#667eea;color:#4338ca}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:3px}

/* Collapse Tab (visible when sidebar collapsed) */
.collapse-tab{display:none;align-items:center;justify-content:center;gap:4px;cursor:pointer;background:#fff;color:#667eea;font-weight:700;font-size:11px;-webkit-tap-highlight-color:transparent;writing-mode:vertical-rl;text-orientation:mixed;height:100%;padding:0;letter-spacing:1px;border:none;width:100%;user-select:none;border-right:1px solid #e5e5ea}
.collapse-tab:hover{background:#f2f2f7;color:#4338ca}
.collapse-tab .ct-arrow{font-size:14px;writing-mode:horizontal-tb;opacity:.7;transition:transform .2s}
.collapse-tab:hover .ct-arrow{opacity:1;transform:translateX(2px)}

@media(max-width:1024px){
  .collapse-tab{writing-mode:horizontal-tb;text-orientation:initial;height:auto;padding:8px 14px;letter-spacing:0;flex-direction:row;gap:6px;border-right:none;border-bottom:1px solid #e5e5ea}
  .collapse-tab:hover .ct-arrow{transform:translateY(2px)}
}

/* Search */
.search{padding:6px 10px;border-radius:6px;border:1px solid #e5e5ea;background:#f5f5f7;color:#1d1d1f;font-size:12px;width:100%;outline:none;margin-top:8px}
.search::placeholder{color:#aeaeb2}
.search:focus{border-color:#667eea}

/* Event List */
.ev-list{flex:1;overflow-y:auto;padding:6px}
.ev-li{padding:8px 10px;border-radius:6px;margin-bottom:3px;cursor:pointer;transition:background .15s;border-left:3px solid transparent;-webkit-tap-highlight-color:transparent}
.ev-li:hover,.ev-li:active{background:#f2f2f7}
.ev-li .d{font-size:9px;color:#8e8e93;font-weight:600}
.ev-li .t{font-size:11px;font-weight:700;color:#1d1d1f;margin:1px 0}
.ev-li .c{font-size:9px;color:#636366}
.ev-li .badge{display:inline-block;font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:3px}

/* Calendar */
.cal-nav{display:flex;align-items:center;gap:10px}
.cal-nav button{background:#f2f2f7;border:1px solid #e5e5ea;color:#1d1d1f;font-size:15px;border-radius:5px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.cal-nav button:active{background:#e5e5ea}
.cal-nav .ml{font-size:16px;font-weight:800;color:#1d1d1f;min-width:140px;text-align:center}
.btn-today{font-size:10px!important;font-weight:700;padding:0 10px;width:auto!important;background:#e8eaf6!important;border:1px solid #c5cae9!important;color:#4338ca!important}
.vtabs{display:flex;gap:3px;margin-left:auto}
.vtab{padding:4px 12px;border-radius:5px;border:1px solid #e5e5ea;font-size:10px;font-weight:700;cursor:pointer;background:#fff;color:#636366;-webkit-tap-highlight-color:transparent}
.vtab.on{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.day-hd{text-align:center;padding:8px 0;font-size:10px;font-weight:700;color:#8e8e93}
.day-hd.sun{color:#ff3b30}.day-hd.sat{color:#007aff}
.day-cell{min-height:100px;background:#fff;border-radius:5px;padding:3px 4px;border:1px solid #e5e5ea;cursor:default}
.day-cell.today{border:2px solid #667eea;background:#f0f0ff}
.day-cell.empty{opacity:.3}
.dn{font-size:11px;font-weight:600;color:#636366;margin-bottom:2px;display:flex;align-items:center;gap:3px}
.dn.sun{color:#ff3b30}.dn.sat{color:#007aff}
.dn .tb{font-size:7px;background:#667eea;color:#fff;padding:0 4px;border-radius:4px;font-weight:800}
.de{font-size:9px;padding:1px 4px;border-radius:3px;margin-bottom:1px;cursor:pointer;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-left:2px solid transparent;transition:transform .1s;-webkit-tap-highlight-color:transparent}
.de:active{transform:translateX(2px)}
.de.imp::before{content:'⚡'}
.dm{font-size:8px;color:#8e8e93;text-align:center;cursor:pointer}

/* Timeline */
.tl-month{font-size:13px;font-weight:800;color:#4338ca;margin:16px 0 8px;padding-bottom:5px;border-bottom:1px solid #e5e5ea}
.tl-row{display:flex;gap:10px;margin-bottom:3px;align-items:flex-start}
.tl-date{min-width:40px;text-align:right;font-size:10px;color:#8e8e93;font-weight:600;padding-top:10px}
.tl-dotc{display:flex;flex-direction:column;align-items:center;padding-top:12px}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tl-line{width:1px;flex:1;background:#e5e5ea;min-height:16px}

/* Event Card */
.evc{border-radius:7px;padding:9px 12px;margin-bottom:5px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;-webkit-tap-highlight-color:transparent}
.evc:active{transform:translateX(3px)}
.evc .evc-top{display:flex;align-items:center;gap:5px}
.evc .evc-ic{font-size:13px}
.evc .evc-ti{font-size:12px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.evc .evc-imp{font-size:8px;background:#fecaca;color:#dc2626;padding:1px 5px;border-radius:5px;font-weight:700}
.evc .evc-meta{display:flex;gap:6px;margin-top:3px;font-size:10px;color:#636366}
.evc .evc-dd{margin-left:auto;font-weight:700}

/* Upcoming */
.up-row{display:flex;gap:10px;margin-bottom:5px;align-items:stretch}
.up-dd{min-width:54px;background:#f2f2f7;border-radius:7px;padding:7px;text-align:center;display:flex;flex-direction:column;justify-content:center;border:1px solid #e5e5ea}
.up-dd .ddn{font-size:14px;font-weight:900}
.up-dd .ddd{font-size:8px;color:#8e8e93}

/* Modal Overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}

/* View Modal */
.modal{background:#fff;border-radius:14px;max-width:480px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.15);overflow:hidden}
.modal-top{padding:20px 24px 12px;position:relative}
.modal-x{position:absolute;top:10px;right:14px;background:none;border:none;font-size:16px;cursor:pointer;color:#8e8e93;padding:4px}
.modal-ic{font-size:28px;margin-bottom:6px}
.modal-ti{font-size:18px;font-weight:900;color:#1d1d1f}
.modal-co{font-size:11px;color:#636366;margin-top:2px}
.modal-tags{display:flex;gap:5px;flex-wrap:wrap;padding:0 24px 12px}
.modal-tag{padding:2px 10px;border-radius:8px;font-size:10px;font-weight:700}
.modal-memo{margin:0 24px 20px;background:#f5f5f7;border-radius:8px;padding:12px 14px;font-size:12px;line-height:1.7;color:#48484a}
.modal-memo strong{color:#1d1d1f}
.modal-acts{padding:10px 24px 18px;display:flex;gap:6px}
.modal-btn{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:none}
.modal-btn.edit{background:#e8eaf6;color:#4338ca}
.modal-btn.del{background:#fee2e2;color:#dc2626}

/* Form Modal */
.form{background:#fff;border-radius:14px;padding:20px 24px;max-width:480px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}
.form h3{font-size:16px;font-weight:800;color:#1d1d1f;margin-bottom:14px}
.fr{margin-bottom:10px}
.fr label{display:block;font-size:10px;color:#8e8e93;font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.fr input,.fr select,.fr textarea{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #e5e5ea;background:#f5f5f7;color:#1d1d1f;font-size:12px;font-family:inherit;outline:none}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:#667eea}
.fr textarea{resize:vertical;min-height:50px}
.fr select option{background:#fff}
.fr-check{display:flex;align-items:center;gap:6px;font-size:12px;color:#1d1d1f;cursor:pointer}
.fr-check input[type=checkbox]{width:15px;height:15px;accent-color:#667eea}
.ic-pick{display:flex;gap:3px;flex-wrap:wrap}
.ic-opt{font-size:18px;cursor:pointer;padding:3px 5px;border-radius:5px;border:1px solid transparent}
.ic-opt.on{background:#e8eaf6;border-color:#667eea}
.form-btns{display:flex;gap:6px;margin-top:14px;justify-content:flex-end}
.fbtn{padding:7px 18px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none}
.fbtn.cancel{background:#f2f2f7;color:#636366}
.fbtn.save{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}

/* FAB */
.fab{position:fixed;bottom:20px;right:20px;width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;color:#fff;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(102,126,234,.3);display:flex;align-items:center;justify-content:center;z-index:100;-webkit-tap-highlight-color:transparent}

/* Stats */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:10px;color:#636366}
.stat-row .sn{font-size:11px;font-weight:800;color:#1d1d1f}

/* Scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px}
</style>
</head>

// Version: bump this number whenever DEFAULT_EVENTS is updated
var DATA_VER=8;

// ── State ──
var state={
  events:null,
  companies:null,
  year:new Date().getFullYear(),month:new Date().getMonth(),
  selCompany:"전체",selCat:"전체",search:"",
  view:"calendar",
  modal:null,formOpen:false,editEv:null,
  sbCollapsed:false,
  nextId:300
};

function loadState(){
  var storedVer=0;
  try{storedVer=parseInt(localStorage.getItem("ivcal_v"))||0}catch(x){}
  if(storedVer<DATA_VER){
    // DEF updated: merge - keep user-added events (id>=300), replace defaults
    var userEvs=[];
    try{var old=JSON.parse(localStorage.getItem("ivcal_ev"));if(old)old.forEach(function(e){if(e.id>=300)userEvs.push(e)})}catch(x){}
    state.events=DEFAULT_EVENTS.slice().concat(userEvs);
    var s={};state.events.forEach(function(e){s[e.company]=1});
    state.companies=Object.keys(s);
    save();
    return;
  }
  try{
    var e=localStorage.getItem("ivcal_ev");
    if(e)state.events=JSON.parse(e);
    var c=localStorage.getItem("ivcal_co");
    if(c)state.companies=JSON.parse(c);
  }catch(x){}
  if(!state.events)state.events=DEFAULT_EVENTS.slice();
  if(!state.companies){
    var s={};state.events.forEach(function(e){s[e.company]=1});
    state.companies=Object.keys(s);
  }
}
function save(){
  try{
    localStorage.setItem("ivcal_ev",JSON.stringify(state.events));
    localStorage.setItem("ivcal_co",JSON.stringify(state.companies));
    localStorage.setItem("ivcal_v",String(DATA_VER));
  }catch(x){}
}

// ── Helpers ──
function fmtD(d){var x=new Date(d+"T00:00:00");return(x.getMonth()+1)+"/"+x.getDate()+" ("+DK[x.getDay()]+")"}
function daysUntil(d){
  var t=new Date();t.setHours(0,0,0,0);
  var diff=Math.ceil((new Date(d+"T00:00:00")-t)/864e5);
  if(diff===0)return"오늘";if(diff===1)return"내일";
  if(diff<0)return Math.abs(diff)+"일 전";
  return"D-"+diff;
}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate()}
function firstDay(y,m){return new Date(y,m,1).getDay()}
function catC(cat){return CATS[cat]||CATS["기타"]}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

function filtered(){
  return state.events.filter(function(e){
    if(state.selCompany!=="전체"&&e.company!==state.selCompany)return false;
    if(state.selCat!=="전체"&&e.category!==state.selCat)return false;
    if(state.search&&e.title.indexOf(state.search)<0&&e.memo.indexOf(state.search)<0&&e.company.indexOf(state.search)<0)return false;
    return true;
  });
}

// ── Render ──
function render(){
  var f=filtered();
  var mp=state.year+"-"+String(state.month+1).padStart(2,"0");
  var mEvs=f.filter(function(e){return e.date.indexOf(mp)===0});
  var byDay={};mEvs.forEach(function(e){var d=parseInt(e.date.split("-")[2]);if(!byDay[d])byDay[d]=[];byDay[d].push(e)});
  var todayStr=new Date().toISOString().slice(0,10);
  var upcoming=f.filter(function(e){return e.date>=todayStr}).sort(function(a,b){return a.date<b.date?-1:1}).slice(0,30);
  var allCo=["전체"].concat(state.companies);

  // Stats
  var stats={};CAT_LIST.forEach(function(c){stats[c]=f.filter(function(e){return e.category===c}).length});

  var h="";

  // Sidebar
  h+='<div class="sidebar'+(state.sbCollapsed?" collapsed":"")+'">';
  h+='<div class="collapse-tab" onclick="toggleSb()"><span class="ct-arrow">▶</span>📋 필터 열기</div>';
  h+='<div class="sb-toggle" onclick="toggleSb()"><span>📋 필터 접기</span><span class="arrow">✕</span></div>';
  h+='<div class="sb-header"><h2>🚢 투자 캘린더</h2>';
  h+='<div id="searchSlot"></div>';
  h+='</div><div class="sb-body">';

  // Company filter
  h+='<div class="filter-grp"><div class="filter-label">기업</div><div class="chips">';
  allCo.forEach(function(c){
    h+='<span class="chip'+(state.selCompany===c?" on":"")+'" onclick="setCompany(\''+esc(c)+'\')">'+esc(c)+'</span>';
  });
  h+='</div></div>';

  // Category filter
  h+='<div class="filter-grp"><div class="filter-label">카테고리</div><div class="chips">';
  h+='<span class="chip'+(state.selCat==="전체"?" on":"")+'" onclick="setCat(\'전체\')">전체</span>';
  CAT_LIST.forEach(function(c){
    var col=CATS[c];
    h+='<span class="chip'+(state.selCat===c?" on":"")+'" onclick="setCat(\''+c+'\')"><span class="dot" style="background:'+col.dt+'"></span>'+c+'</span>';
  });
  h+='</div></div>';

  // Stats
  h+='<div class="filter-grp">';
  CAT_LIST.forEach(function(c){
    if(stats[c]>0){
      var col=CATS[c];
      h+='<div class="stat-row"><span><span class="dot" style="background:'+col.dt+'"></span> '+c+'</span><span class="sn">'+stats[c]+'</span></div>';
    }
  });
  h+='</div>';

  // Event list
  var listEvs=state.view==="calendar"?mEvs.slice().sort(function(a,b){return a.date<b.date?-1:1}):upcoming;
  h+='<div class="ev-list">';
  h+='<div style="padding:3px 8px;font-size:9px;color:#4b5563;font-weight:700;display:flex;justify-content:space-between">';
  h+='<span>'+(state.view==="calendar"?MK[state.month]+" "+mEvs.length+"건":"전체 "+f.length+"건")+'</span>';
  h+='<span style="color:#f87171;cursor:pointer" onclick="resetData()">초기화</span></div>';
  listEvs.forEach(function(e){
    var c=catC(e.category);
    h+='<div class="ev-li'+(e.important?" important":"")+'" style="border-left-color:'+c.bd+'" onclick="showModal('+e.id+')">';
    h+='<div class="d">'+fmtD(e.date)+' · '+daysUntil(e.date)+'</div>';
    h+='<div class="t">'+(e.important?"⚡ ":"")+e.icon+' '+esc(e.title)+'</div>';
    h+='<div class="c">'+esc(e.company)+'<span class="badge" style="background:'+c.bg+';color:'+c.tx+'">'+e.category+'</span></div>';
    h+='</div>';
  });
  h+='</div></div></div>';

  // Main
  h+='<div class="main"><div class="header">';
  if(state.view==="calendar"){
    h+='<div class="cal-nav">';
    h+='<button onclick="prevMonth()">‹</button>';
    h+='<span class="ml">'+state.year+'년 '+MK[state.month]+'</span>';
    h+='<button onclick="nextMonth()">›</button>';
    h+='<button class="btn-today" onclick="goToday()">오늘</button>';
    h+='</div>';
  }else{
    h+='<div style="font-size:14px;font-weight:800;color:#fff">'+(state.view==="timeline"?"📋 전체 타임라인":"⏰ 다가오는 이벤트")+'</div>';
  }
  h+='<div class="vtabs">';
  [["calendar","📅 달력"],["timeline","📋 타임라인"],["upcoming","⏰ 다가오는"]].forEach(function(v){
    h+='<button class="vtab'+(state.view===v[0]?" on":"")+'" onclick="setView(\''+v[0]+'\')">'+v[1]+'</button>';
  });
  h+='</div></div>';

  h+='<div class="content">';

  // Calendar View
  if(state.view==="calendar"){
    var dim=daysInMonth(state.year,state.month);
    var fd=firstDay(state.year,state.month);
    h+='<div class="cal-grid">';
    DK.forEach(function(d,i){h+='<div class="day-hd'+(i===0?" sun":"")+(i===6?" sat":"")+'">'+d+'</div>'});
    for(var i=0;i<fd;i++)h+='<div class="day-cell empty"></div>';
    for(var d=1;d<=dim;d++){
      var evs=byDay[d]||[];
      var td=new Date();var isToday=state.year===td.getFullYear()&&state.month===td.getMonth()&&d===td.getDate();
      var dow=(fd+d-1)%7;
      h+='<div class="day-cell'+(isToday?" today":"")+'">';
      h+='<div class="dn'+(dow===0?" sun":"")+(dow===6?" sat":"")+'">'+d+(isToday?'<span class="tb">TODAY</span>':"")+'</div>';
      evs.slice(0,3).forEach(function(e){
        var c=catC(e.category);
        h+='<div class="de'+(e.important?" imp":"")+'" style="background:'+c.bg+';color:'+c.tx+';border-left-color:'+c.bd+'" onclick="showModal('+e.id+')">'+e.icon+' '+(e.title.length>12?esc(e.title.slice(0,12))+"…":esc(e.title))+'</div>';
      });
      if(evs.length>3)h+='<div class="dm">+'+(evs.length-3)+'개</div>';
      h+='</div>';
    }
    h+='</div>';
  }

  // Timeline View
  if(state.view==="timeline"){
    var sorted=f.slice().sort(function(a,b){return a.date<b.date?-1:1});
    var prevM="";
    sorted.forEach(function(e){
      var m=e.date.slice(0,7);
      if(m!==prevM){
        var mi=parseInt(e.date.split("-")[1])-1;
        h+='<div class="tl-month">'+e.date.split("-")[0]+'년 '+MK[mi]+'</div>';
        prevM=m;
      }
      var c=catC(e.category);
      h+='<div class="tl-row">';
      h+='<div class="tl-date">'+parseInt(e.date.split("-")[2])+'일</div>';
      h+='<div class="tl-dotc"><div class="tl-dot" style="background:'+c.dt+'"></div><div class="tl-line"></div></div>';
      h+='<div style="flex:1">';
      h+=renderCard(e);
      h+='</div></div>';
    });
  }

  // Upcoming View
  if(state.view==="upcoming"){
    upcoming.forEach(function(e){
      var dd=daysUntil(e.date);
      var urgent=dd.indexOf("D-")===0&&parseInt(dd.replace("D-",""))<=7;
      h+='<div class="up-row">';
      h+='<div class="up-dd"><div class="ddn" style="color:'+(urgent?"#f87171":"#818cf8")+'">'+dd+'</div><div class="ddd">'+fmtD(e.date).split(" ")[0]+'</div></div>';
      h+='<div style="flex:1">'+renderCard(e)+'</div></div>';
    });
  }

  h+='</div></div>';
  document.getElementById("app").innerHTML=h;

  // Move persistent search input into slot (never destroyed = iOS keyboard stays up)
  var slot=document.getElementById("searchSlot");
  var si=document.getElementById("searchInput");
  if(slot&&si){si.style.display="";slot.appendChild(si)}
}

function renderCard(e){
  var c=catC(e.category);
  var h='<div class="evc" style="background:'+c.bg+';border-left-color:'+c.bd+'" onclick="showModal('+e.id+')">';
  h+='<div class="evc-top"><span class="evc-ic">'+e.icon+'</span>';
  h+='<span class="evc-ti" style="color:'+c.tx+'">'+esc(e.title)+'</span>';
  if(e.important)h+='<span class="evc-imp">중요</span>';
  h+='</div><div class="evc-meta"><span>'+esc(e.company)+'</span><span>·</span><span>'+fmtD(e.date)+'</span>';
  h+='<span class="evc-dd" style="color:'+c.tx+'">'+daysUntil(e.date)+'</span></div></div>';
  return h;
}

// ── Modal ──
function showModal(id){
  var e=state.events.find(function(x){return x.id===id});
  if(!e)return;
  var c=catC(e.category);
  var dd=daysUntil(e.date);
  var fut=e.date>=new Date().toISOString().slice(0,10);
  var h='<div class="overlay" onclick="closeModal()">';
  h+='<div class="modal" style="border-top:4px solid '+c.bd+'" onclick="event.stopPropagation()">';
  h+='<div class="modal-top"><button class="modal-x" onclick="closeModal()">✕</button>';
  h+='<div class="modal-ic">'+e.icon+'</div>';
  h+='<div class="modal-ti">'+esc(e.title)+'</div>';
  h+='<div class="modal-co">'+esc(e.company)+'</div></div>';
  h+='<div class="modal-tags">';
  h+='<span class="modal-tag" style="background:'+c.bg+';color:'+c.tx+'">'+e.category+'</span>';
  h+='<span class="modal-tag" style="background:rgba(255,255,255,.06);color:#d1d5db">'+fmtD(e.date)+'</span>';
  h+='<span class="modal-tag" style="background:'+(fut?"rgba(16,185,129,.15)":"rgba(239,68,68,.15)")+';color:'+(fut?"#6ee7b7":"#fca5a5")+'">'+dd+'</span>';
  if(e.important)h+='<span class="modal-tag" style="background:rgba(239,68,68,.15);color:#fca5a5">⚡ 중요</span>';
  h+='</div>';
  if(e.memo)h+='<div class="modal-memo"><strong>메모 / 투자 포인트</strong><br>'+esc(e.memo)+'</div>';
  h+='<div class="modal-acts">';
  h+='<button class="modal-btn edit" onclick="editEvent('+e.id+')">✏️ 수정</button>';
  h+='<button class="modal-btn del" onclick="deleteEvent('+e.id+')">🗑️ 삭제</button>';
  h+='</div></div></div>';
  document.body.insertAdjacentHTML("beforeend",h);
}
function closeModal(){
  var o=document.querySelector(".overlay");
  if(o)o.remove();
}

// ── Form ──
function openForm(ev){
  closeModal();
  var isEdit=!!ev;
  var d=ev||{date:new Date().toISOString().slice(0,10),title:"",company:state.companies[0]||"",category:"기타",icon:"📌",memo:"",important:false};
  var h='<div class="overlay" onclick="closeForm()">';
  h+='<div class="form" onclick="event.stopPropagation()">';
  h+='<h3>'+(isEdit?"이벤트 수정":"새 이벤트 추가")+'</h3>';
  h+='<div class="fr"><label>날짜</label><input type="date" id="fDate" value="'+d.date+'"></div>';
  h+='<div class="fr"><label>제목</label><input id="fTitle" value="'+esc(d.title)+'" placeholder="이벤트 제목"></div>';
  h+='<div class="fr"><label>기업 <span style="font-size:9px;color:#818cf8;cursor:pointer;margin-left:6px" onclick="toggleNewCo()">+ 새 기업</span></label>';
  h+='<select id="fCompany">';
  state.companies.forEach(function(c){h+='<option value="'+esc(c)+'"'+(c===d.company?" selected":"")+'>'+esc(c)+'</option>'});
  h+='</select>';
  h+='<div id="newCoDiv" style="display:none;margin-top:6px;display:flex;gap:4px;display:none"><input id="fNewCo" placeholder="새 기업명" style="flex:1;padding:6px 8px;border-radius:5px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;font-size:11px;outline:none"><button class="fbtn save" style="padding:4px 10px;font-size:10px" onclick="addNewCo()">추가</button></div>';
  h+='</div>';
  h+='<div class="fr"><label>카테고리</label><select id="fCat">';
  CAT_LIST.forEach(function(c){h+='<option value="'+c+'"'+(c===d.category?" selected":"")+'>'+c+'</option>'});
  h+='</select></div>';
  h+='<div class="fr"><label>아이콘</label><div class="ic-pick">';
  ICONS.forEach(function(ic){h+='<span class="ic-opt'+(ic===d.icon?" on":"")+'" onclick="pickIcon(this,\''+ic+'\')">'+ic+'</span>'});
  h+='</div><input type="hidden" id="fIcon" value="'+d.icon+'"></div>';
  h+='<div class="fr"><label>메모</label><textarea id="fMemo" placeholder="투자 포인트 메모">'+esc(d.memo)+'</textarea></div>';
  h+='<div class="fr"><label class="fr-check"><input type="checkbox" id="fImp"'+(d.important?" checked":"")+'>⚡ 중요 이벤트</label></div>';
  h+='<div class="form-btns">';
  h+='<button class="fbtn cancel" onclick="closeForm()">취소</button>';
  h+='<button class="fbtn save" onclick="saveForm('+(isEdit?d.id:"null")+')">'+(isEdit?"저장":"추가")+'</button>';
  h+='</div></div></div>';
  document.body.insertAdjacentHTML("beforeend",h);
}
function closeForm(){
  var els=document.querySelectorAll(".overlay");
  els.forEach(function(e){e.remove()});
}
function toggleNewCo(){
  var d=document.getElementById("newCoDiv");
  d.style.display=d.style.display==="none"?"flex":"none";
}
function addNewCo(){
  var v=document.getElementById("fNewCo").value.trim();
  if(!v)return;
  if(state.companies.indexOf(v)<0){state.companies.push(v);save()}
  var sel=document.getElementById("fCompany");
  var opt=document.createElement("option");opt.value=v;opt.text=v;opt.selected=true;
  sel.add(opt);
  document.getElementById("newCoDiv").style.display="none";
}
function pickIcon(el,ic){
  document.querySelectorAll(".ic-opt").forEach(function(e){e.classList.remove("on")});
  el.classList.add("on");
  document.getElementById("fIcon").value=ic;
}
function saveForm(editId){
  var obj={
    date:document.getElementById("fDate").value,
    title:document.getElementById("fTitle").value,
    company:document.getElementById("fCompany").value,
    category:document.getElementById("fCat").value,
    icon:document.getElementById("fIcon").value,
    memo:document.getElementById("fMemo").value,
    important:document.getElementById("fImp").checked
  };
  if(!obj.title||!obj.date)return alert("제목과 날짜를 입력하세요");
  if(editId!==null){
    obj.id=editId;
    state.events=state.events.map(function(e){return e.id===editId?obj:e});
  }else{
    obj.id=state.nextId++;
    state.events.push(obj);
  }
  if(state.companies.indexOf(obj.company)<0)state.companies.push(obj.company);
  save();closeForm();render();
}

// ── Actions ──
function editEvent(id){
  var e=state.events.find(function(x){return x.id===id});
  if(e)openForm(e);
}
function deleteEvent(id){
  if(!confirm("이 이벤트를 삭제하시겠습니까?"))return;
  state.events=state.events.filter(function(e){return e.id!==id});
  save();closeModal();render();
}
function resetData(){
  if(!confirm("모든 데이터를 초기 상태로 되돌리시겠습니까?"))return;
  state.events=DEFAULT_EVENTS.slice();
  var s={};state.events.forEach(function(e){s[e.company]=1});
  state.companies=Object.keys(s);
  save();render();
}
function setCompany(c){state.selCompany=c;render()}
function setCat(c){state.selCat=c;render()}
function setView(v){state.view=v;render()}
function prevMonth(){
  state.month--;
  if(state.month<0){state.month=11;state.year--}
  render();
}
function nextMonth(){
  state.month++;
  if(state.month>11){state.month=0;state.year++}
  render();
}
function goToday(){var d=new Date();state.year=d.getFullYear();state.month=d.getMonth();render()}
function toggleSb(){state.sbCollapsed=!state.sbCollapsed;render()}

// ── Swipe ──
var touchStartX=0,touchStartY=0;
document.addEventListener("touchstart",function(e){
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
},{passive:true});
document.addEventListener("touchend",function(e){
  var dx=e.changedTouches[0].clientX-touchStartX;
  var dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)<50||Math.abs(dy)>Math.abs(dx))return;
  if(state.view!=="calendar")return;
  if(dx<0)nextMonth();else prevMonth();
},{passive:true});

// ── Init ──
loadState();
render();
document.getElementById("fabBtn").onclick=function(){openForm(null)};
document.getElementById("searchInput").oninput=function(){state.search=this.value;render()};
</script>
</body>
